<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGJ" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#16294D"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgGJ)"/>
  <!-- charkha wheel -->
  <g transform="translate(180,125)">
    <circle r="62" fill="none" stroke="#F4C542" stroke-width="3"/>
    <circle r="6" fill="#F4C542"/>
    <g stroke="#E7B84B" stroke-width="1.5">
      <line x1="0" y1="0" x2="0" y2="-62"/>
      <line x1="0" y1="0" x2="0" y2="62"/>
      <line x1="0" y1="0" x2="62" y2="0"/>
      <line x1="0" y1="0" x2="-62" y2="0"/>
      <line x1="0" y1="0" x2="44" y2="-44"/>
      <line x1="0" y1="0" x2="-44" y2="-44"/>
      <line x1="0" y1="0" x2="44" y2="44"/>
      <line x1="0" y1="0" x2="-44" y2="44"/>
    </g>
    <circle r="62" fill="none" stroke="#F4C542" stroke-width="1" opacity="0.4" stroke-dasharray="2 4"/>
  </g>
  <!-- base / spindle -->
  <g transform="translate(180,125)">
    <line x1="62" y1="0" x2="120" y2="0" stroke="#C9A227" stroke-width="4"/>
    <ellipse cx="130" cy="0" rx="8" ry="14" fill="#F4EFE6" opacity="0.9"/>
  </g>
  <rect x="150" y="185" width="60" height="8" rx="2" fill="#8A6E1C"/>
  <line x1="180" y1="187" x2="180" y2="140" stroke="#8A6E1C" stroke-width="4"/>
  <!-- podium / mic for elocution -->
  <g transform="translate(300,155)">
    <rect x="-6" y="-26" width="12" height="30" rx="6" fill="#F4EFE6" opacity="0.85"/>
    <path d="M-12,0 Q-12,14 0,14 Q12,14 12,0" fill="none" stroke="#F4EFE6" stroke-width="2.5" opacity="0.85"/>
    <line x1="0" y1="14" x2="0" y2="28" stroke="#F4EFE6" stroke-width="2.5" opacity="0.85"/>
  </g>
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F4EFE6" letter-spacing="2">GANDHI JAYANTI</text>
</svg>
