      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#16294D"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgWH)"/>
  <!-- heart -->
  <g transform="translate(160,130)">
    <path d="M0,26 C-40,0 -50,-30 -26,-42 C-8,-50 0,-32 0,-24 C0,-32 8,-50 26,-42 C50,-30 40,0 0,26 Z" fill="#C9536B" opacity="0.9"/>
    <path d="M0,26 C-40,0 -50,-30 -26,-42 C-8,-50 0,-32 0,-24 C0,-32 8,-50 26,-42 C50,-30 40,0 0,26 Z" fill="none" stroke="#F4C542" stroke-width="2"/>
  </g>
  <!-- pulse line -->
  <polyline points="60,150 110,150 125,120 145,175 160,150 400,150" fill="none" stroke="#F4C542" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- discussion bubbles -->
  <g transform="translate(280,90)">
    <rect x="-40" y="-24" width="80" height="42" rx="12" fill="#F4EFE6" opacity="0.95"/>
    <path d="M-14,18 L-6,32 L2,18 Z" fill="#F4EFE6" opacity="0.95"/>
