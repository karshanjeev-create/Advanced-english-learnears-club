<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgED" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#132548"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgED)"/>
  <!-- blueprint grid -->
  <g stroke="#2A3F66" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="80" y1="0" x2="80" y2="250"/>
    <line x1="160" y1="0" x2="160" y2="250"/>
    <line x1="240" y1="0" x2="240" y2="250"/>
    <line x1="320" y1="0" x2="320" y2="250"/>
  </g>
  <!-- large gear -->
  <g transform="translate(160,120)">
    <circle r="46" fill="none" stroke="#F4C542" stroke-width="4"/>
    <circle r="16" fill="#0A1428" stroke="#F4C542" stroke-width="3"/>
    <g fill="#F4C542">
      <rect x="-6" y="-58" width="12" height="18" rx="2"/>
      <rect x="-6" y="40" width="12" height="18" rx="2"/>
      <rect x="-58" y="-6" width="18" height="12" rx="2"/>
      <rect x="40" y="-6" width="18" height="12" rx="2"/>
      <rect x="-6" y="-58" width="12" height="18" rx="2" transform="rotate(45)"/>
      <rect x="-6" y="40" width="12" height="18" rx="2" transform="rotate(45)"/>
      <rect x="-58" y="-6" width="18" height="12" rx="2" transform="rotate(45)"/>
      <rect x="40" y="-6" width="18" height="12" rx="2" transform="rotate(45)"/>
    </g>
  </g>
  <!-- small gear -->
  <g transform="translate(235,90)">
    <circle r="24" fill="none" stroke="#E7B84B" stroke-width="3"/>
    <circle r="8" fill="#0A1428" stroke="#E7B84B" stroke-width="2"/>
    <g fill="#E7B84B">
      <rect x="-4" y="-30" width="8" height="10" rx="1"/>
      <rect x="-4" y="20" width="8" height="10" rx="1"/>
      <rect x="-30" y="-4" width="10" height="8" rx="1"/>
      <rect x="20" y="-4" width="10" height="8" rx="1"/>
    </g>
  </g>
  <!-- mic for extempore -->
  <g transform="translate(280,165)">
    <rect x="-8" y="-30" width="16" height="34" rx="8" fill="#F4EFE6"/>
    <path d="M-16,-2 Q-16,16 0,16 Q16,16 16,-2" fill="none" stroke="#F4EFE6" stroke-width="3"/>
    <line x1="0" y1="16" x2="0" y2="32" stroke="#F4EFE6" stroke-width="3"/>
    <line x1="-12" y1="32" x2="12" y2="32" stroke="#F4EFE6" stroke-width="3"/>
  </g>
  <text x="200" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F4EFE6" letter-spacing="2">ENGINEERS DAY</text>
</svg>
